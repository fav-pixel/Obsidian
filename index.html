<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>OBSIDIAN</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpolygon points='16,2 28,10 28,22 16,30 4,22 4,10' fill='%230c0c10' stroke='%23c9a84c' stroke-width='1.5'/%3E%3Ccircle cx='16' cy='16' r='3' fill='%23c9a84c' opacity='0.85'/%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ─── TOKENS ─── */
:root {
  --void:#050507; --obs:#0c0c10; --obs-mid:#13131a; --obs-light:#1c1c26;
  --glass:rgba(255,255,255,0.03); --glass-h:rgba(255,255,255,0.055);
  --gb:rgba(255,255,255,0.07);
  --gold:#c9a84c; --gold-b:#e8c96a; --gold-d:rgba(201,168,76,0.5);
  --gold-g:rgba(201,168,76,0.12); --gold-gs:rgba(201,168,76,0.22);
  --parch:#e8dfc8; --parch-d:rgba(232,223,200,0.5);
  --ember:#b85c00; --muted:rgba(232,223,200,0.35);
  --tr:all 0.28s cubic-bezier(0.4,0,0.2,1);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{font-family:'Cormorant Garamond',serif;background:var(--void);color:var(--parch);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(201,168,76,0.04) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(139,26,26,0.05) 0%,transparent 50%);pointer-events:none;z-index:0;}

/* ─── PARTICLES ─── */
#particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.ptc{position:absolute;border-radius:50%;background:var(--gold);opacity:0;animation:ptcDrift linear infinite;}
@keyframes ptcDrift{0%{transform:translateY(105vh) scale(0);opacity:0;}10%{opacity:.35;}90%{opacity:.1;}100%{transform:translateY(-10vh) translateX(25px) scale(1);opacity:0;}}

/* ─── LOADING ─── */
#loader{position:fixed;inset:0;z-index:300;background:var(--void);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .65s ease;}
#loader.gone{opacity:0;pointer-events:none;}
.ld-emb{width:108px;height:108px;margin-bottom:2rem;}
.ld-emb svg{width:100%;height:100%;}
.er1{animation:spin 13s linear infinite;transform-origin:54px 54px;}
.er2{animation:spin 8s linear infinite reverse;transform-origin:54px 54px;}
.ec{animation:cp 2.2s ease-in-out infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes cp{0%,100%{opacity:.5;filter:drop-shadow(0 0 3px rgba(201,168,76,.3));}50%{opacity:1;filter:drop-shadow(0 0 10px rgba(201,168,76,.75));}}
.ld-title{font-size:2.1rem;font-weight:300;letter-spacing:.6em;text-transform:uppercase;background:linear-gradient(180deg,#e8dfc8 0%,var(--gold) 50%,#a07830 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.ld-sub{font-family:'Courier Prime',monospace;font-size:.5rem;letter-spacing:.5em;color:rgba(201,168,76,.38);text-transform:uppercase;margin-top:.45rem;}
.ld-bar-w{width:108px;height:1px;background:rgba(201,168,76,.1);margin-top:2rem;overflow:hidden;}
.ld-bar{height:1px;width:0%;background:linear-gradient(90deg,transparent,var(--gold),transparent);animation:ldp 1.7s .3s cubic-bezier(.4,0,.2,1) forwards;}
@keyframes ldp{to{width:100%;}}

/* ─── SCREENS ─── */
.screen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem 1.5rem;position:relative;z-index:1;}
.screen.active{display:flex;}
#dash{justify-content:flex-start;padding:0;}

/* ─── LOGIN / REGISTER SHARED ─── */
.auth-screen{background:linear-gradient(160deg,var(--void) 0%,#0a0a12 50%,var(--void) 100%);}

/* SEAL */
.seal{width:90px;height:90px;margin-bottom:2rem;border:1px solid var(--gold-d);border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;background:radial-gradient(circle,var(--gold-g) 0%,transparent 70%);animation:fdw 1s ease both,sealGlow 3s 1.2s ease-in-out infinite;flex-shrink:0;}
@keyframes sealGlow{0%,100%{box-shadow:0 0 35px rgba(201,168,76,.09);}50%{box-shadow:0 0 55px rgba(201,168,76,.18);}}
.seal::before{content:'';position:absolute;inset:7px;border:1px solid rgba(201,168,76,.25);border-radius:50%;animation:spin 20s linear infinite;}
.seal::after{content:'';position:absolute;inset:14px;border:1px solid rgba(201,168,76,.1);border-radius:50%;animation:spin 14s linear infinite reverse;}
.seal svg{width:32px;height:32px;fill:var(--gold);opacity:.85;position:relative;z-index:1;}

/* HEADINGS */
.auth-title{font-size:2.9rem;font-weight:300;letter-spacing:.44em;text-transform:uppercase;background:linear-gradient(180deg,#f0e8d0 0%,var(--gold) 50%,#a07830 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:fdw 1s .1s ease both;cursor:default;}
.auth-tag{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.88rem;letter-spacing:.17em;color:var(--muted);margin-top:.45rem;animation:fdw 1s .18s ease both;}
.auth-sub{font-family:'Courier Prime',monospace;font-size:.48rem;letter-spacing:.44em;color:rgba(201,168,76,.38);text-transform:uppercase;margin-top:.1rem;margin-bottom:2.2rem;animation:fdw 1s .25s ease both;}

/* INPUTS */
.ig{width:100%;max-width:300px;margin-bottom:.4rem;animation:fup 1s .32s ease both;}
.ig label{font-family:'Courier Prime',monospace;font-size:.52rem;letter-spacing:.28em;color:rgba(201,168,76,.52);text-transform:uppercase;display:block;margin-bottom:.5rem;}
.ig input{width:100%;padding:.85rem 1rem;background:var(--glass);border:1px solid var(--gb);border-bottom:1px solid var(--gold-d);font-family:'Courier Prime',monospace;font-size:.88rem;color:var(--parch);outline:none;transition:var(--tr);-webkit-appearance:none;border-radius:0;letter-spacing:.07em;}
.ig input::placeholder{color:rgba(232,223,200,.18);}
.ig input:focus{background:rgba(201,168,76,.04);border-bottom-color:var(--gold);}

.err{font-family:'Courier Prime',monospace;font-size:.6rem;color:#c97070;letter-spacing:.09em;margin-top:.45rem;min-height:1rem;text-align:center;}
.ok-msg{font-family:'Courier Prime',monospace;font-size:.6rem;color:rgba(201,168,76,.7);letter-spacing:.09em;margin-top:.45rem;min-height:1rem;text-align:center;}
.lockout-msg{font-family:'Courier Prime',monospace;font-size:.6rem;color:var(--ember);letter-spacing:.09em;text-align:center;margin:.35rem 0;display:none;}

/* BUTTONS */
.btn{width:100%;max-width:300px;padding:.95rem;background:transparent;border:1px solid var(--gold-d);color:var(--gold);font-family:'Courier Prime',monospace;font-size:.66rem;letter-spacing:.32em;text-transform:uppercase;cursor:pointer;transition:var(--tr);margin-top:1rem;border-radius:0;-webkit-appearance:none;animation:fup 1s .4s ease both;}
.btn:hover{border-color:var(--gold);background:var(--gold-g);}
.btn:active{transform:scale(.99);}
.btn:disabled{opacity:.32;cursor:not-allowed;}
.btn-ghost{background:transparent;border:1px solid rgba(255,255,255,.08);color:var(--muted);margin-top:.7rem;animation:fup 1s .48s ease both;}
.btn-ghost:hover{border-color:var(--gold-d);color:var(--gold);background:var(--gold-g);}
.btn-bio{display:flex;align-items:center;justify-content:center;gap:.55rem;}
.btn-bio svg{width:16px;height:16px;fill:currentColor;}

.divider{width:100%;max-width:300px;display:flex;align-items:center;gap:.9rem;margin:.4rem 0;animation:fup 1s .44s ease both;}
.divider span{font-family:'Courier Prime',monospace;font-size:.5rem;color:rgba(232,223,200,.18);letter-spacing:.18em;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.06);}

.link-row{display:flex;gap:1.6rem;margin-top:1.4rem;animation:fup 1s .52s ease both;}
.lnk{font-family:'Courier Prime',monospace;font-size:.5rem;letter-spacing:.17em;text-transform:uppercase;color:rgba(232,223,200,.2);background:none;border:none;cursor:pointer;transition:color .22s;}
.lnk:hover{color:rgba(201,168,76,.55);}

/* ─── DASHBOARD ─── */
.dash-hdr{width:100%;background:linear-gradient(180deg,rgba(5,5,7,.98) 0%,rgba(12,12,16,.95) 100%);padding:1rem 1.3rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;border-bottom:1px solid rgba(201,168,76,.14);backdrop-filter:blur(24px);}
.dash-hdr h1{font-size:.95rem;font-weight:300;letter-spacing:.34em;text-transform:uppercase;background:linear-gradient(90deg,var(--parch) 0%,var(--gold) 50%,var(--parch-d) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.vstatus{font-family:'Courier Prime',monospace;font-size:.48rem;letter-spacing:.2em;color:rgba(201,168,76,.42);text-transform:uppercase;margin-top:.18rem;display:flex;align-items:center;gap:.38rem;}
.sdot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.14);transition:background .5s;}
.sdot.live{background:var(--gold);animation:pulse 2.5s infinite;}
.hdr-btns{display:flex;align-items:center;gap:.45rem;}
.hbtn{font-family:'Courier Prime',monospace;font-size:.5rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(201,168,76,.48);background:none;border:1px solid rgba(201,168,76,.13);cursor:pointer;padding:.36rem .68rem;transition:var(--tr);}
.hbtn:hover{color:var(--gold);border-color:var(--gold-d);background:var(--gold-g);}

/* DASH BODY */
.db{width:100%;padding:1.3rem;max-width:500px;margin:0 auto;}

/* KEEPER CARD */
.kcard{display:flex;align-items:center;gap:.9rem;margin-bottom:1.4rem;padding:1.1rem;background:var(--glass);border:1px solid var(--gb);border-left:2px solid var(--gold-d);}
.kav{width:42px;height:42px;border-radius:50%;border:1px solid var(--gold-d);background:radial-gradient(circle,var(--gold-g) 0%,transparent 70%);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:300;color:var(--gold);flex-shrink:0;}
.kname{font-size:1.2rem;font-weight:300;color:var(--parch);}
.krole{font-family:'Courier Prime',monospace;font-size:.46rem;letter-spacing:.26em;color:rgba(201,168,76,.48);text-transform:uppercase;margin-top:.16rem;}
.kdate{font-family:'Courier Prime',monospace;font-size:.52rem;color:var(--muted);letter-spacing:.13em;margin-top:.08rem;text-transform:uppercase;}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;margin-bottom:1.3rem;}
.scard{background:var(--glass);border:1px solid var(--gb);border-top:1px solid var(--gold-d);padding:.82rem .65rem;text-align:center;transition:var(--tr);}
.scard:hover{background:var(--glass-h);border-top-color:var(--gold);}
.snum{font-size:1.5rem;font-weight:300;color:var(--gold);line-height:1;}
.slbl{font-family:'Courier Prime',monospace;font-size:.42rem;letter-spacing:.18em;color:var(--muted);text-transform:uppercase;margin-top:.22rem;}

/* ARCHIVIST BADGE + PANEL */
.abadge{font-family:'Courier Prime',monospace;font-size:.41rem;letter-spacing:.24em;text-transform:uppercase;color:var(--gold);border:1px solid var(--gold-d);padding:.12rem .42rem;background:var(--gold-g);display:none;margin-left:.45rem;vertical-align:middle;}
.apanel{background:rgba(201,168,76,.04);border:1px solid rgba(201,168,76,.2);border-left:2px solid var(--gold);padding:.95rem 1.1rem;margin-bottom:1rem;display:none;animation:fup .4s ease;}
.atitle{font-family:'Courier Prime',monospace;font-size:.56rem;letter-spacing:.26em;text-transform:uppercase;color:var(--gold);margin-bottom:.65rem;}
.abtns{display:flex;gap:.4rem;flex-wrap:wrap;}
.abtn{font-family:'Courier Prime',monospace;font-size:.5rem;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);background:none;border:1px solid var(--gold-d);padding:.3rem .6rem;cursor:pointer;transition:var(--tr);}
.abtn:hover{background:var(--gold-g);}
.abtn.danger{color:#c05050;border-color:rgba(192,80,80,.38);}
.abtn.danger:hover{background:rgba(192,80,80,.1);}

/* SECTION HEAD */
.shead{display:flex;align-items:center;justify-content:space-between;margin-bottom:.85rem;padding-bottom:.5rem;border-bottom:1px solid rgba(255,255,255,.05);}
.shead h2{font-size:.68rem;font-weight:400;letter-spacing:.28em;text-transform:uppercase;color:var(--gold);font-family:'Courier Prime',monospace;}
.ecount{font-family:'Courier Prime',monospace;font-size:.5rem;color:var(--muted);letter-spacing:.13em;}

/* SEARCH + FILTERS */
.sbar{display:flex;gap:.4rem;margin-bottom:.65rem;}
.sinput{flex:1;background:var(--glass);border:1px solid var(--gb);border-bottom:1px solid var(--gold-d);font-family:'Courier Prime',monospace;font-size:.68rem;color:var(--parch);outline:none;padding:.55rem .8rem;letter-spacing:.05em;border-radius:0;transition:var(--tr);}
.sinput::placeholder{color:rgba(232,223,200,.18);font-style:italic;}
.sinput:focus{background:rgba(201,168,76,.04);border-bottom-color:var(--gold);}
.fbtn{font-family:'Courier Prime',monospace;font-size:.46rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);background:var(--glass);border:1px solid var(--gb);padding:.42rem .6rem;cursor:pointer;transition:var(--tr);white-space:nowrap;}
.fbtn.on{color:var(--gold);border-color:var(--gold-d);background:var(--gold-g);}
.fbtn:hover{color:var(--gold);border-color:var(--gold-d);}
.frow{display:flex;flex-wrap:wrap;gap:.32rem;margin-bottom:.9rem;}

/* FEED */
.feed{margin-bottom:.9rem;}
.fload{font-family:'Courier Prime',monospace;font-size:.58rem;color:var(--muted);letter-spacing:.22em;text-align:center;padding:2.2rem 0;animation:pulse 1.8s infinite;}
.empty{text-align:center;padding:2.5rem 1rem;}
.empt-seal{width:44px;height:44px;border:1px solid rgba(201,168,76,.14);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto .9rem;color:rgba(201,168,76,.22);font-size:1.1rem;}
.empt-t{font-size:1.1rem;font-weight:300;color:var(--muted);margin-bottom:.3rem;}
.empt-s{font-family:'Courier Prime',monospace;font-size:.5rem;letter-spacing:.13em;color:rgba(232,223,200,.18);text-transform:uppercase;}

/* ENTRY CARD */
.entry{background:var(--glass);border:1px solid var(--gb);border-top:1px solid var(--gold-d);padding:1.05rem 1.05rem .88rem;margin-bottom:.7rem;position:relative;animation:fup .45s ease both;transition:var(--tr);}
.entry:hover{background:var(--glass-h);border-top-color:var(--gold);}
.entry.burn{border-top-color:rgba(184,92,0,.48);}
.entry.burn .ea{color:var(--ember);}
.entry.pinned{border-left:2px solid var(--gold-d);}
.entry.fav{border-right:2px solid rgba(201,168,76,.26);}
.entry.flash{animation:flash 1.5s ease,fup .45s ease both;}
@keyframes flash{0%{border-top-color:var(--gold);background:rgba(201,168,76,.07);}100%{border-top-color:var(--gold-d);background:var(--glass);}}
.entry.burning{animation:burnFade 1.1s ease forwards;pointer-events:none;}
@keyframes burnFade{0%{opacity:1;filter:blur(0);}60%{opacity:.5;filter:blur(1px);}100%{opacity:0;filter:blur(6px);}}

.ehdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:.7rem;}
.ea{font-family:'Courier Prime',monospace;font-size:.6rem;font-weight:700;letter-spacing:.19em;text-transform:uppercase;color:var(--gold);}
.ecat{font-family:'Courier Prime',monospace;font-size:.44rem;letter-spacing:.13em;color:rgba(201,168,76,.38);text-transform:uppercase;margin-top:.1rem;}
.emeta{display:flex;flex-direction:column;align-items:flex-end;gap:.15rem;}
.etime{font-family:'Courier Prime',monospace;font-size:.46rem;color:var(--muted);letter-spacing:.04em;}
.ebadge{font-family:'Courier Prime',monospace;font-size:.42rem;letter-spacing:.08em;text-transform:uppercase;color:var(--ember);border:1px solid rgba(184,92,0,.38);padding:.08rem .3rem;}
.econtent{font-size:1rem;font-weight:300;line-height:1.8;color:var(--parch);white-space:pre-wrap;opacity:.9;}
.econtent.blur{filter:blur(5px);user-select:none;pointer-events:none;}
.etags{display:flex;flex-wrap:wrap;gap:.25rem;margin-top:.65rem;}
.etag{font-family:'Courier Prime',monospace;font-size:.42rem;letter-spacing:.09em;text-transform:uppercase;color:rgba(201,168,76,.38);border:1px solid rgba(201,168,76,.13);padding:.08rem .35rem;cursor:pointer;transition:var(--tr);}
.etag:hover{color:var(--gold);border-color:var(--gold-d);}
.eacts{display:flex;align-items:center;gap:.3rem;flex-wrap:wrap;margin-top:.75rem;padding-top:.65rem;border-top:1px solid rgba(255,255,255,.04);}
.eab{font-family:'Courier Prime',monospace;font-size:.44rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);background:none;border:1px solid rgba(255,255,255,.06);padding:.2rem .48rem;cursor:pointer;transition:var(--tr);}
.eab:hover{color:var(--gold);border-color:var(--gold-d);}
.eab.on{color:var(--gold);border-color:var(--gold-d);background:var(--gold-g);}
.eab.x{color:rgba(200,80,80,.48);}
.eab.x:hover{color:#c05050;border-color:rgba(200,80,80,.38);}
.erxns{display:flex;gap:.22rem;margin-left:auto;align-items:center;}
.rxb{background:none;border:none;cursor:pointer;font-size:.72rem;opacity:.42;transition:var(--tr);padding:.06rem .16rem;font-family:'Courier Prime',monospace;color:var(--parch);}
.rxb:hover{opacity:1;transform:scale(1.2);}
.rxb.on{opacity:1;color:var(--gold);}
.bar-reveal{margin-top:.7rem;}
.rvbtn{font-family:'Courier Prime',monospace;font-size:.54rem;letter-spacing:.13em;text-transform:uppercase;color:var(--ember);background:none;border:1px solid rgba(184,92,0,.32);padding:.35rem .8rem;cursor:pointer;transition:var(--tr);}
.rvbtn:hover{background:rgba(184,92,0,.1);border-color:var(--ember);}
.ediv{width:1.6rem;height:1px;background:linear-gradient(90deg,var(--gold-d),transparent);margin-top:.7rem;}

/* REPLIES */
.rplwrap{padding-top:.65rem;}
.rpli{background:rgba(201,168,76,.03);border-left:1px solid var(--gold-d);padding:.52rem .72rem;margin-bottom:.38rem;}
.rpla{font-family:'Courier Prime',monospace;font-size:.48rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-bottom:.22rem;}
.rplt{font-size:.86rem;font-weight:300;color:var(--parch-d);line-height:1.6;}
.rplrow{display:flex;gap:.32rem;margin-top:.42rem;}
.rplinput{flex:1;background:var(--glass);border:none;border-bottom:1px solid rgba(201,168,76,.17);font-family:'Cormorant Garamond',serif;font-size:.86rem;color:var(--parch);outline:none;padding:.35rem .5rem;}
.rplinput::placeholder{color:rgba(232,223,200,.18);font-style:italic;}
.rplsend{font-family:'Courier Prime',monospace;font-size:.44rem;letter-spacing:.13em;text-transform:uppercase;color:var(--gold);background:none;border:1px solid var(--gold-d);padding:.3rem .6rem;cursor:pointer;transition:var(--tr);}
.rplsend:hover{background:var(--gold-g);}

/* COMPOSER */
.composer{background:var(--glass);border:1px solid var(--gb);border-left:1px solid var(--gold-d);padding:1.05rem;margin-bottom:1rem;transition:var(--tr);}
.composer:focus-within{border-left-color:var(--gold);background:rgba(201,168,76,.02);}
.clabel{font-family:'Courier Prime',monospace;font-size:.52rem;color:rgba(201,168,76,.52);letter-spacing:.28em;text-transform:uppercase;margin-bottom:.62rem;}
.cmeta{display:flex;gap:.38rem;margin-bottom:.65rem;padding-bottom:.65rem;border-bottom:1px solid rgba(255,255,255,.04);}
.csm{flex:1;background:transparent;border:none;border-bottom:1px solid rgba(255,255,255,.07);font-family:'Courier Prime',monospace;font-size:.6rem;color:var(--muted);outline:none;padding:.2rem .35rem;letter-spacing:.06em;min-width:0;}
.csm::placeholder{color:rgba(232,223,200,.17);}
.csm:focus{border-bottom-color:var(--gold-d);color:var(--parch);}
.composer textarea{width:100%;background:transparent;border:none;font-family:'Cormorant Garamond',serif;font-size:1.05rem;color:var(--parch);resize:none;outline:none;line-height:1.75;min-height:82px;}
.composer textarea::placeholder{color:rgba(232,223,200,.17);font-style:italic;}
.bopts{display:flex;flex-wrap:wrap;gap:.32rem;margin:.7rem 0;border-top:1px solid rgba(255,255,255,.05);padding-top:.7rem;}
.bopt{font-family:'Courier Prime',monospace;f
